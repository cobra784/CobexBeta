<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cobex - L'intégrale Ninjago</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#CC1100;--yellow:#FFD700;--bg:#0a0a0f;--bg2:#13131e;--text:#f0e8d0;
      --green:#2ecc71;
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    header{
      background:rgba(0,0,0,0.95); border-bottom:4px solid var(--red);
      padding:15px 30px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:1000;
    }
    .logo{font-family:'Bangers'; font-size:3rem; color:var(--red); letter-spacing:5px; cursor:pointer; text-decoration:none}
    .logo span{color:var(--yellow)}

    /* Badge Connectés */
    .online-status {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--green);
      padding: 5px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      color: var(--green);
      font-size: 0.9rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--green);
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
    #home-page { display: block; text-align: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .hero-img {
      max-width: 500px; width: 100%; border: 5px solid var(--yellow);
      border-radius: 20px; margin: 30px auto; box-shadow: 0 0 30px rgba(255,215,0,0.3);
    }

    .season-menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .btn-main {
      background: var(--red); color: white; padding: 12px 20px; border-radius: 10px;
      font-family: 'Bangers'; font-size: 1.1rem; border: 3px solid var(--yellow);
      cursor: pointer; transition: 0.3s; text-transform: uppercase;
    }
    .btn-main:hover { transform: scale(1.05); background: var(--yellow); color: black; }

    .season-title { font-family: 'Bangers'; font-size: 3rem; color: var(--red); text-align: center; margin: 20px 0; text-shadow: 2px 2px 0 #000;}
    .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
    .ep-card { background: var(--bg2); border: 2px solid #222; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; }
    .ep-card:hover { border-color: var(--yellow); transform: translateY(-5px); }
    .ep-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .ep-info { padding: 12px; }
    .ep-num { color: var(--red); font-family: 'Bangers'; font-size: 1.1rem; }

    #player-page { text-align: center; }
    .player-container {
      width: 95%; max-width: 1000px; margin: 20px auto; aspect-ratio: 16/9;
      background: #000; border: 4px solid var(--red); border-radius: 15px;
      overflow: hidden; box-shadow: 0 0 50px rgba(204,17,0,0.5);
    }
    iframe { width: 100%; height: 100%; border: none; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 10px; }

    footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #1a1a1a; margin-top: 50px; }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('home-page')">CO<span>B</span>EX</div>
  <div class="online-status">
    <div class="dot"></div>
    <span id="user-count">Chargement...</span> Ninjas en ligne
  </div>
</header>

<div id="home-page" class="page">
  <img src="https://i.ytimg.com/vi/3bHcONp5i8E/maxresdefault.jpg" class="hero-img">
  <h1 style="font-family:'Bangers'; font-size:3.5rem; margin-bottom:10px;">L'intégrale Ninjago</h1>
  <div class="season-menu" id="season-buttons-container"></div>
</div>

<div id="episodes-page" class="page">
  <div class="nav-bar">
    <button class="btn-main" style="font-size: 1rem; padding: 8px 20px;" onclick="showPage('home-page')">← Retour</button>
    <h2 id="current-season-label" class="season-title" style="margin: 0;">SAISON</h2>
  </div>
  <div id="grid-container" class="ep-grid"></div>
</div>

<div id="player-page" class="page">
  <div class="nav-bar">
    <button class="btn-main" style="font-size: 1rem; padding: 8px 20px;" onclick="showPage('episodes-page')">← Retour à la liste</button>
  </div>
  <h2 id="video-title" class="season-title" style="font-size: 2rem;">Titre</h2>
  <div class="player-container">
    <iframe id="main-iframe" src="" allowfullscreen></iframe>
  </div>
</div>

const btnContainer = document.getElementById('season-buttons-container');
for (let i = 1; i <= 15; i++) {
  const btn = document.createElement('button');
  btn.className = 'btn-main';
  const name = ninjagoData[i] ? ninjagoData[i].name : "Saison " + i;
  btn.textContent = `Saison ${i} : ${name}`;
  btn.onclick = () => loadSeason(i);
  btnContainer.appendChild(btn);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  if(id !== 'player-page') document.getElementById('main-iframe').src = "";
  window.scrollTo(0,0);
}

function loadSeason(id) {
  const container = document.getElementById('grid-container');
  container.innerHTML = "";
  document.getElementById('current-season-label').textContent = "SAISON " + id;
  const s = ninjagoData[id];
  if(s && s.episodes.length > 0) {
    s.episodes.forEach(ep => {
      const card = document.createElement('div');
      card.className = 'ep-card';
      card.onclick = () => openPlayer(ep.t, ep.u);
      card.innerHTML = `<img src="${ep.i || 'https://via.placeholder.com/300x170/13131e/f0e8d0?text=Ninjago'}"><div class="ep-info"><span class="ep-num">${ep.n}</span><br>${ep.t}</div>`;
      container.appendChild(card);
    });
  } else {
    container.innerHTML = "<p style='grid-column:1/-1; padding:50px;'>Bientôt disponible !</p>";
  }
  showPage('episodes-page');
}

function openPlayer(title, url) {
  if(!url) return;
  document.getElementById('video-title').textContent = title;
  document.getElementById('main-iframe').src = url;
  showPage('player-page');
}
</script>
</body>
</html>
